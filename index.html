<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;padding:20px;}
  h1{color:#fff;font-size:32px;font-weight:900;letter-spacing:2px;margin-bottom:16px;}
  .hud{display:flex;gap:24px;margin-bottom:20px;}
  .hud-item{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:10px 20px;text-align:center;}
  .hud-val{color:#fff;font-size:22px;font-weight:800;}
  .hud-label{color:rgba(255,255,255,0.4);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .difficulty{display:flex;gap:8px;margin-bottom:20px;}
  .diff-btn{padding:7px 18px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.5);font-family:'Nunito';font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .diff-btn.active{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.4);}
  .grid{display:grid;gap:10px;}
  .card{perspective:600px;cursor:pointer;}
  .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);}
  .card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
  .card-front,.card-back{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-size:32px;}
  .card-front{background:linear-gradient(135deg,#1e3a5f,#0f2640);border:2px solid rgba(255,255,255,0.08);}
  .card-front::after{content:'?';color:rgba(255,255,255,0.15);font-size:28px;font-weight:900;}
  .card-back{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid rgba(255,255,255,0.15);transform:rotateY(180deg);}
  .card.matched .card-back{background:linear-gradient(135deg,#14532d,#052e16);border-color:#22c55e44;box-shadow:0 0 20px rgba(34,197,94,0.2);}
  .win{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;}
  .win-card{background:#1e293b;border-radius:24px;padding:40px;text-align:center;border:1px solid rgba(255,255,255,0.1);}
  .win-emoji{font-size:64px;margin-bottom:12px;}
  .win-title{color:#fff;font-size:28px;font-weight:900;margin-bottom:8px;}
  .win-sub{color:#64748b;font-size:15px;margin-bottom:24px;}
  .play-btn{padding:14px 32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;font-family:'Nunito';font-size:16px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<h1>🃏 Memory Game</h1>
<div class="hud">
  <div class="hud-item"><div class="hud-val" id="moves">0</div><div class="hud-label">Moves</div></div>
  <div class="hud-item"><div class="hud-val" id="timer">0:00</div><div class="hud-label">Time</div></div>
  <div class="hud-item"><div class="hud-val" id="pairs">0/0</div><div class="hud-label">Pairs</div></div>
</div>
<div class="difficulty">
  <button class="diff-btn active" onclick="setDiff(4,this)">Easy (4×4)</button>
  <button class="diff-btn" onclick="setDiff(5,this)">Medium (5×4)</button>
  <button class="diff-btn" onclick="setDiff(6,this)">Hard (6×4)</button>
</div>
<div class="grid" id="grid"></div>
<div class="win" id="win">
  <div class="win-card">
    <div class="win-emoji">🎉</div>
    <div class="win-title">You Won!</div>
    <div class="win-sub" id="winSub"></div>
    <button class="play-btn" onclick="restart()">Play Again</button>
  </div>
</div>
<script>
const EMOJIS=['🐶','🐱','🦊','🐻','🐼','🦁','🐯','🦄','🐸','🦋','🌺','🍕','🎮','🚀','🎸','🏆','💎','🌙','⚡','🎯','🍦','🎪','🦀','🌈'];
let cols=4,flipped=[],matched=[],moves=0,timerInterval,seconds=0,started=false,totalPairs=0;

function setDiff(c,btn){cols=c;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');restart();}

function restart(){
  clearInterval(timerInterval);seconds=0;moves=0;flipped=[];matched=[];started=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('timer').textContent='0:00';
  document.getElementById('win').style.display='none';
  const pairs=cols===4?8:cols===5?10:12;totalPairs=pairs;
  document.getElementById('pairs').textContent=`0/${pairs}`;
  const emojis=[...EMOJIS.slice(0,pairs),...EMOJIS.slice(0,pairs)].sort(()=>Math.random()-0.5);
  const grid=document.getElementById('grid');
  const rows=4;
  grid.style.gridTemplateColumns=`repeat(${cols},${cols===6?70:cols===5?80:90}px)`;
  grid.innerHTML=emojis.map((e,i)=>`
    <div class="card" id="c${i}" onclick="flip(${i})">
      <div class="card-inner" style="width:${cols===6?70:cols===5?80:90}px;height:${cols===6?70:cols===5?80:90}px">
        <div class="card-front"></div>
        <div class="card-back">${e}</div>
      </div>
    </div>`).join('');
}

function flip(i){
  if(!started){started=true;timerInterval=setInterval(()=>{seconds++;const m=Math.floor(seconds/60),s=seconds%60;document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;},1000);}
  const card=document.getElementById('c'+i);
  if(card.classList.contains('flipped')||card.classList.contains('matched')||flipped.length===2)return;
  card.classList.add('flipped');flipped.push(i);
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    const [a,b]=flipped;
    const ea=document.getElementById('c'+a).querySelector('.card-back').textContent;
    const eb=document.getElementById('c'+b).querySelector('.card-back').textContent;
    if(ea===eb){
      setTimeout(()=>{document.getElementById('c'+a).classList.add('matched');document.getElementById('c'+b).classList.add('matched');flipped=[];matched.push(a,b);document.getElementById('pairs').textContent=`${matched.length/2}/${totalPairs}`;if(matched.length===totalPairs*2)win();},400);
    }else{setTimeout(()=>{document.getElementById('c'+a).classList.remove('flipped');document.getElementById('c'+b).classList.remove('flipped');flipped=[];},800);}
  }
}

function win(){
  clearInterval(timerInterval);
  document.getElementById('win').style.display='flex';
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('winSub').textContent=`Completed in ${moves} moves and ${m}:${s.toString().padStart(2,'0')}!`;
}
restart();
</script>
</body>
</html>
